<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt & Skill Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fafaf9;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.18);
  --text: #1a1a18;
  --text-2: #5a5a56;
  --text-3: #a8a8a3;
  --badge-prompt-bg: #EFF6FF;
  --badge-prompt: #1e40af;
  --badge-skill-bg: #ECFDF5;
  --badge-skill: #065f46;
  --star: #b45309;
  --r-sm: 7px; --r-md: 10px; --r-lg: 14px; --r-xl: 18px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --sidebar-w: 210px;
}

html, body { height: 100%; }
body { font-family: 'Instrument Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

/* ── LAYOUT ── */
.layout { display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 10; }
.main { margin-left: var(--sidebar-w); padding: clamp(1.25rem,3vw,2rem) clamp(1.25rem,3vw,2.5rem); min-width: 0; flex: 1; }

/* ── SIDEBAR ── */
.logo { display: flex; align-items: center; gap: 9px; }
.logo-icon { width: 30px; height: 30px; background: var(--text); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-icon i { color: #fff; font-size: 15px; }
.logo-name { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
.logo-sub { font-size: 10.5px; color: var(--text-3); }

.nav-label { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 0.07em; text-transform: uppercase; padding: 0 8px; margin-bottom: 3px; }
.nav-group { display: flex; flex-direction: column; gap: 1px; }

.nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: var(--r-sm); font-size: 13px; color: var(--text-2); cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-family: inherit; transition: background 0.12s, color 0.12s; }
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active { background: var(--bg); color: var(--text); font-weight: 500; }
.nav-item i { font-size: 16px; color: var(--text-3); }
.nav-item.active i { color: var(--text); }
.nav-count { margin-left: auto; font-size: 10.5px; color: var(--text-3); background: var(--bg); padding: 1px 6px; border-radius: 999px; border: 1px solid var(--border); }

/* tag list – draggable */
.tag-list { display: flex; flex-direction: column; gap: 1px; }
.tag-item { display: flex; align-items: center; gap: 7px; padding: 5px 9px; border-radius: var(--r-sm); font-size: 12px; color: var(--text-2); cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-family: inherit; transition: background 0.12s, color 0.12s; user-select: none; }
.tag-item:hover { background: var(--bg); color: var(--text); }
.tag-item.active { background: var(--bg); color: var(--text); font-weight: 500; }
.tag-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); flex-shrink: 0; }
.tag-drag-handle { margin-left: auto; color: var(--text-3); font-size: 13px; opacity: 0; cursor: grab; }
.tag-item:hover .tag-drag-handle { opacity: 1; }
.tag-item.drag-over { background: #ebebea; border-radius: var(--r-sm); }

.sidebar-foot { margin-top: auto; }
.add-btn-side { width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 9px; border-radius: var(--r-md); border: 1px solid var(--border-strong); background: transparent; color: var(--text); font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; transition: background 0.12s; }
.add-btn-side:hover { background: var(--bg); }

/* ── TOPBAR ── */
.topbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.page-title { font-family: 'Instrument Serif', Georgia, serif; font-size: clamp(18px,2.5vw,24px); letter-spacing: -0.02em; flex: 1; min-width: 120px; }
.search-wrap { position: relative; }
.search-wrap i { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text-3); pointer-events: none; }
.search-wrap input { padding: 7px 11px 7px 30px; border: 1px solid var(--border); border-radius: var(--r-md); font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; width: clamp(150px,20vw,210px); transition: border-color 0.15s; }
.search-wrap input:focus { border-color: var(--border-strong); }
.search-wrap input::placeholder { color: var(--text-3); }
.topbar-btn { display: flex; align-items: center; gap: 5px; padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--r-md); font-size: 12.5px; font-family: inherit; background: var(--surface); color: var(--text-2); cursor: pointer; transition: background 0.12s, border-color 0.12s; white-space: nowrap; }
.topbar-btn:hover { background: var(--bg); border-color: var(--border-strong); color: var(--text); }
.topbar-btn i { font-size: 15px; }
.topbar-btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
.topbar-btn.primary:hover { background: #333330; }
select.topbar-btn { cursor: pointer; }

/* ── STATS ── */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit,minmax(110px,1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: .9rem 1rem; }
.stat-lbl { font-size: 10.5px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.stat-val { font-size: 24px; font-weight: 600; letter-spacing: -0.03em; }

/* ── CARD GRID ── */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(min(280px,100%),1fr)); gap: 12px; }

/* card drag */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s; display: flex; flex-direction: column; box-shadow: var(--shadow); user-select: none; }
.card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }
.card.dragging { opacity: 0.4; cursor: grabbing; }
.card.drag-over-card { border: 2px dashed var(--border-strong); }
.drag-handle { position: absolute; top: 8px; left: 8px; color: rgba(255,255,255,0.8); font-size: 14px; opacity: 0; cursor: grab; z-index: 2; background: rgba(0,0,0,0.25); border-radius: 4px; padding: 2px 3px; line-height: 1; }
.card-img-wrap:hover .drag-handle,
.card-img-ph-wrap:hover .drag-handle { opacity: 1; }

/* effect image */
.card-img-wrap { position: relative; border-bottom: 1px solid var(--border); cursor: zoom-in; }
.card-img-wrap::after { content: '\eb1c'; font-family: 'tabler-icons'; position: absolute; bottom: 8px; right: 8px; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.35); color: #fff; font-size: 13px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; pointer-events: none; }
.card-img-wrap:hover::after { opacity: 1; }
.card-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.card-img-ph-wrap { position: relative; }
.card-img-ph { width: 100%; aspect-ratio: 16/9; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-3); font-size: 12px; transition: background 0.12s; border-bottom: 1px solid var(--border); }
.card-img-ph i { font-size: 22px; opacity: 0.5; }
.card-img-ph:hover { background: #f0f0ee; color: var(--text-2); }
.img-del { position: absolute; top: 7px; right: 7px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.4); color: #fff; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 12px; }
.card-img-wrap:hover .img-del { display: flex; }

.card-body { padding: .9rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 7px; }
.card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 7px; }
.card-name { font-size: 13.5px; font-weight: 600; color: var(--text); line-height: 1.35; letter-spacing: -0.01em; }
.type-badge { font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
.b-prompt { background: var(--badge-prompt-bg); color: var(--badge-prompt); }
.b-skill  { background: var(--badge-skill-bg);  color: var(--badge-skill);  }
.b-json   { background: #FFF7ED; color: #9A3412; }

/* tooltip for truncated text */
.card-text { font-size: 12.5px; color: var(--text-2); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; position: relative; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.card-tag { font-size: 11px; padding: 2px 7px; border-radius: 999px; background: var(--bg); color: var(--text-2); border: 1px solid var(--border); }
.card-note { font-size: 11.5px; color: var(--text-3); font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 7px; border-top: 1px solid var(--border); }
.stars { display: flex; gap: 1px; }
.star { font-size: 13px; color: var(--border-strong); cursor: pointer; user-select: none; }
.star.lit { color: var(--star); }
.star:hover { color: var(--star); }
.card-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s; }
.card:hover .card-actions { opacity: 1; }
.ico-btn { width: 27px; height: 27px; border: none; background: transparent; cursor: pointer; color: var(--text-3); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.1s, color 0.1s; }
.ico-btn:hover { background: var(--bg); color: var(--text); }
.ico-btn.del:hover { background: #fff0f0; color: #c0392b; }
.ico-btn.dl:hover { background: #f0fff4; color: #065f46; }

/* ── TOOLTIP ── */
.tooltip-box { position: fixed; z-index: 500; background: #1a1a18; color: #fff; font-size: 12px; line-height: 1.5; padding: 8px 11px; border-radius: 8px; max-width: 320px; word-break: break-word; white-space: pre-wrap; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.18); opacity: 0; transition: opacity 0.15s; }
.tooltip-box.show { opacity: 1; }

/* ── EMPTY ── */
.empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--text-3); }
.empty i { font-size: 30px; display: block; margin-bottom: 10px; }
.empty p { font-size: 13.5px; }

/* ── MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--r-xl); border: 1px solid var(--border-strong); width: min(560px,95vw); max-height: 92vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.13); animation: up 0.18s ease; }
@keyframes up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
.modal-hd { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.375rem 0; }
.modal-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
.modal-close { width: 28px; height: 28px; border: none; background: var(--bg); border-radius: 7px; cursor: pointer; color: var(--text-2); display: flex; align-items: center; justify-content: center; font-size: 16px; }
.modal-close:hover { background: var(--border); }
.modal-body { padding: 1.1rem 1.375rem; display: flex; flex-direction: column; gap: .95rem; }
.f-label { font-size: 11.5px; font-weight: 600; color: var(--text-2); display: block; margin-bottom: 4px; }
.f-hint { font-size: 10.5px; color: var(--text-3); font-weight: 400; margin-left: 3px; }
.f-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border-strong); border-radius: var(--r-md); font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
.f-input:focus { border-color: var(--text); }
.f-input::placeholder { color: var(--text-3); }
textarea.f-input { resize: vertical; min-height: 96px; line-height: 1.6; }
.type-tog { display: flex; gap: 7px; }
.t-opt { flex: 1; padding: 8px 10px; border: 1px solid var(--border-strong); border-radius: var(--r-md); font-size: 13px; font-family: inherit; background: transparent; color: var(--text-2); cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.12s; font-weight: 500; }
.t-opt:hover { background: var(--bg); }
.t-opt.p-sel { background: var(--badge-prompt-bg); color: var(--badge-prompt); border-color: #93c5fd; }
.t-opt.s-sel { background: var(--badge-skill-bg); color: var(--badge-skill); border-color: #6ee7b7; }

.img-drop { border: 1.5px dashed var(--border-strong); border-radius: var(--r-md); padding: 1.1rem; text-align: center; cursor: pointer; background: var(--bg); transition: all 0.12s; }
.img-drop:hover { border-color: var(--text-2); background: #f0f0ee; }
.img-drop i { font-size: 24px; color: var(--text-3); display: block; margin-bottom: 5px; }
.img-drop .dt { font-size: 12.5px; color: var(--text-2); font-weight: 500; }
.img-drop .ds { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.img-drop input { display: none; }
.img-prev-wrap { position: relative; border-radius: var(--r-md); overflow: hidden; }
.img-prev { width: 100%; max-height: 170px; object-fit: cover; display: block; border: 1px solid var(--border); border-radius: var(--r-md); }
.img-rm { position: absolute; top: 7px; right: 7px; background: rgba(0,0,0,0.5); color: #fff; border: none; cursor: pointer; border-radius: 6px; padding: 3px 8px; font-size: 11px; font-family: inherit; display: flex; align-items: center; gap: 3px; }
.img-rm:hover { background: rgba(0,0,0,0.7); }

.form-stars { display: flex; gap: 4px; margin-top: 3px; }
.f-star { font-size: 22px; cursor: pointer; color: var(--border-strong); user-select: none; transition: color 0.1s; }
.f-star.lit { color: var(--star); }
.f-star:hover { color: var(--star); }

.modal-ft { display: flex; justify-content: flex-end; gap: 8px; padding: .95rem 1.375rem 1.25rem; border-top: 1px solid var(--border); }
.btn-cancel { padding: 8px 18px; border: 1px solid var(--border-strong); border-radius: var(--r-md); font-size: 13px; font-family: inherit; background: transparent; color: var(--text-2); cursor: pointer; }
.btn-cancel:hover { background: var(--bg); }
.btn-save { padding: 8px 22px; border: 1px solid var(--text); border-radius: var(--r-md); font-size: 13px; font-family: inherit; font-weight: 600; background: var(--text); color: #fff; cursor: pointer; transition: opacity 0.12s; }
.btn-save:hover { opacity: 0.85; }

/* ── LIGHTBOX ── */
.lightbox { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.88); align-items: center; justify-content: center; backdrop-filter: blur(6px); cursor: zoom-out; }
.lightbox.open { display: flex; animation: lbIn 0.18s ease; }
@keyframes lbIn { from { opacity:0; } to { opacity:1; } }
.lb-img { max-width: min(92vw,1200px); max-height: 88vh; object-fit: contain; border-radius: var(--r-lg); box-shadow: 0 24px 80px rgba(0,0,0,0.5); animation: lbScale 0.22s cubic-bezier(0.34,1.4,0.64,1); cursor: default; user-select: none; }
@keyframes lbScale { from { transform:scale(0.88); opacity:0; } to { transform:scale(1); opacity:1; } }
.lb-close { position: fixed; top: 1rem; right: 1rem; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; cursor: pointer; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.lb-close:hover { background: rgba(255,255,255,0.28); }
.lb-hint { position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,0.45); pointer-events: none; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 1.25rem; right: 1.25rem; background: var(--text); color: #fff; font-size: 12.5px; font-weight: 500; padding: 8px 14px; border-radius: var(--r-md); opacity: 0; transform: translateY(6px); transition: opacity 0.18s, transform 0.18s; pointer-events: none; z-index: 200; box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
.toast.show { opacity: 1; transform: none; }

/* ── RESPONSIVE ── */
@media (max-width: 680px) {
  :root { --sidebar-w: 0px; }
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 1rem; }
  .topbar { gap: 6px; }
  .page-title { font-size: 18px; width: 100%; flex: none; }
  .search-wrap input { width: 100%; }
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .topbar-btn span { display: none; }
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }
</style>
</head>
<body>

<div class="layout">
<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-sparkles"></i></div>
    <div>
      <div class="logo-name">Prompt Manager</div>
      <div class="logo-sub">提示词 & Skill</div>
    </div>
  </div>

  <div class="nav-group">
    <div class="nav-label">分类</div>
    <button class="nav-item active" onclick="setType('all',this)" id="nav-all">
      <i class="ti ti-layout-grid"></i> 全部
      <span class="nav-count" id="cnt-all">0</span>
    </button>
    <button class="nav-item" onclick="setType('prompt',this)" id="nav-prompt">
      <i class="ti ti-message-2"></i> 提示词
      <span class="nav-count" id="cnt-prompt">0</span>
    </button>
    <button class="nav-item" onclick="setType('skill',this)" id="nav-skill">
      <i class="ti ti-puzzle"></i> Skill
      <span class="nav-count" id="cnt-skill">0</span>
    </button>
  </div>

  <div class="nav-group">
    <div class="nav-label">标签</div>
    <div class="tag-list" id="tagList"></div>
  </div>

  <div class="sidebar-foot">
    <button class="add-btn-side" onclick="openModal()">
      <i class="ti ti-plus"></i> 新建
    </button>
  </div>
</aside>

<!-- ── MAIN ── -->
<main class="main">
  <div class="topbar">
    <h1 class="page-title" id="pageTitle">全部</h1>
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="searchInput" placeholder="搜索…" oninput="render()">
    </div>
    <select class="topbar-btn" id="sortSel" onchange="render()">
      <option value="new" selected>最新</option>
      <option value="manual">自定义排序</option>
      <option value="rating">评分</option>
      <option value="name">名称</option>
    </select>
    <button class="topbar-btn" onclick="exportJSON()"><i class="ti ti-download"></i><span>导出</span></button>
    <button class="topbar-btn" onclick="importClick()"><i class="ti ti-upload"></i><span>导入</span></button>
    <button class="topbar-btn primary" onclick="openModal()"><i class="ti ti-plus"></i><span>新建</span></button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>

  <div class="stats-row" id="statsRow"></div>
  <div class="card-grid" id="cardGrid"></div>
</main>
</div>

<!-- ── MODAL ── -->
<div class="overlay" id="overlay" onclick="overlayBg(event)">
<div class="modal">
  <div class="modal-hd">
    <span class="modal-title" id="modalTitle">新建</span>
    <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
  </div>
  <div class="modal-body">
    <div>
      <label class="f-label">类型</label>
      <div class="type-tog">
        <button class="t-opt p-sel" id="optP" onclick="selType('prompt')"><i class="ti ti-message-2"></i> 提示词</button>
        <button class="t-opt" id="optS" onclick="selType('skill')"><i class="ti ti-puzzle"></i> Skill</button>
      </div>
    </div>
    <div>
      <label class="f-label">名称</label>
      <input class="f-input" id="fName" placeholder="给它起个名字…">
    </div>
    <div>
      <label class="f-label">内容</label>
      <textarea class="f-input" id="fContent" placeholder="粘贴完整提示词或 Skill 描述…"></textarea>
    </div>

    <!-- Prompt source: text or JSON file (only shown for Prompt type) -->
    <div id="promptSourceRow">
      <label class="f-label">提示词来源</label>
      <div class="type-tog">
        <button class="t-opt p-sel" id="promptModeText" onclick="selPromptMode('text')">
          <i class="ti ti-copy"></i> 直接输入
        </button>
        <button class="t-opt" id="promptModeJson" onclick="selPromptMode('json')">
          <i class="ti ti-file-type-json"></i> JSON 文件
        </button>

<script>
// ═══════════════════════════════════════════
//  Storage: IndexedDB for images (unlimited),
//  localStorage for text data only
// ═══════════════════════════════════════════
const STORE_KEY = 'pm_v5';
const DB_NAME = 'pmImgDB', DB_VER = 1, STORE_NAME = 'images';

let db = null;
// in-memory image cache: { [id]: base64 }
const imgCache = {};

function openDB() {
  return new Promise((resolve, reject) => {
    if (db) { resolve(db); return; }
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id' });
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

async function dbSaveImg(id, base64) {
  const database = await openDB();
  return new Promise((resolve, reject) => {
    const tx = database.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put({ id, base64 });
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function dbDeleteImg(id) {
  const database = await openDB();
  return new Promise((resolve, reject) => {
    const tx = database.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function dbGetImg(id) {
  if (imgCache[id] !== undefined) return imgCache[id];
  const database = await openDB();
  return new Promise((resolve, reject) => {
    const tx = database.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(id);
    req.onsuccess = () => {
      const val = req.result ? req.result.base64 : '';
      imgCache[id] = val;
      resolve(val);
    };
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAllImgs() {
  const database = await openDB();
  return new Promise((resolve, reject) => {
    const tx = database.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

// ═══════════════════════════════════════════
//  App State
// ═══════════════════════════════════════════
let items = loadTextData();
let tagOrder = loadTagOrder();   // custom tag ordering
let typeFilter = 'all', activeTag = '', editId = null, fRating = 0, fType = 'prompt', fImg = '';
let fContentFormat = 'text';     // text | json | md
let fSourceFileName = '';
// card drag state
let dragSrcId = null;
// tag drag state
let tagDragSrc = null;

function loadTextData() {
  try {
    const r = localStorage.getItem(STORE_KEY);
    if (r) {
      const parsed = JSON.parse(r);
      // migrate old img field out if present, and add content format metadata
      parsed.forEach(item => {
        if (item.img) delete item.img;
        if (!item.contentFormat) item.contentFormat = item.type === 'skill' ? 'md' : 'text';
        if (!item.sourceFileName) item.sourceFileName = '';
      });
      return parsed;
    }
  } catch(e) {}
  return [
    {id:1,type:'prompt',name:'专业邮件润色',content:'你是一位资深商务写作专家。请对以下邮件进行润色，使其更专业、简洁、有说服力，保持原意不变。',tags:['写作','邮件','商务'],rating:4,note:'正式场合效果极佳',order:1,created:Date.now()-8e5},
    {id:2,type:'skill',name:'UX Audit 体验审计',content:'资深 UI/UX 专家体验审计。当用户提供产品截图或功能描述时，从可用性、视觉层级、交互逻辑三维度给出结构化反馈。',tags:['设计','UX'],rating:5,note:'结合截图效果最佳',order:2,created:Date.now()-5e5},
    {id:3,type:'prompt',name:'代码审查助手',content:'你是高级软件工程师，请对以下代码进行 code review，指出 bug、性能问题、可读性建议，并给出改进示例。',tags:['代码','开发'],rating:3,note:'',order:3,created:Date.now()-3e5},
    {id:4,type:'skill',name:'日报生成器',content:'根据用户描述的今日工作内容，生成适合钉钉/飞书的日报，格式整洁，突出重点。',tags:['效率','职场'],rating:4,note:'收尾神器',order:4,created:Date.now()-2e5},
    {id:5,type:'prompt',name:'中英术语翻译',content:'你是技术翻译专家，将以下文本精准翻译，保留专业术语并在括号内附原文。',tags:['翻译','技术'],rating:5,note:'',order:5,created:Date.now()-1e5},
  ];
}

function loadTagOrder() {
  try { const r = localStorage.getItem(STORE_KEY + '_tagorder'); if(r) return JSON.parse(r); } catch(e){}
  return [];
}

function saveData() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(items)); }
  catch(e) { showToast('⚠️ 文字数据保存失败：' + e.message); }
  localStorage.setItem(STORE_KEY + '_tagorder', JSON.stringify(tagOrder));
}

// ═══════════════════════════════════════════
//  Tag helpers
// ═══════════════════════════════════════════
function allTagsSorted() {
  const set = new Set();
  items.forEach(i => i.tags.forEach(t => set.add(t)));
  const existing = [...set];
  // apply saved order
  const ordered = tagOrder.filter(t => existing.includes(t));
  existing.forEach(t => { if (!ordered.includes(t)) ordered.push(t); });
  return ordered;
}

// ═══════════════════════════════════════════
//  Filter & sort
// ═══════════════════════════════════════════
function filtered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const s = document.getElementById('sortSel').value;
  let list = items.filter(i => {
    if (typeFilter !== 'all' && i.type !== typeFilter) return false;
    if (activeTag && !i.tags.includes(activeTag)) return false;
    if (q && !i.name.toLowerCase().includes(q) && !i.content.toLowerCase().includes(q) && !i.tags.join(' ').toLowerCase().includes(q)) return false;
    return true;
  });
  if (s === 'manual') list.sort((a,b) => (a.order||0) - (b.order||0));
  else if (s === 'new') list.sort((a,b) => b.created - a.created);
  else if (s === 'rating') list.sort((a,b) => b.rating - a.rating);
  else list.sort((a,b) => a.name.localeCompare(b.name,'zh'));
  return list;
}

// ═══════════════════════════════════════════
//  Navigation
// ═══════════════════════════════════════════
function setType(t, el) {
  typeFilter = t; activeTag = '';
  document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  const map = {all:'全部', prompt:'提示词', skill:'Skill'};
  document.getElementById('pageTitle').textContent = map[t];
  render();
}
function setTag(t) {
  activeTag = activeTag === t ? '' : t;
  typeFilter = 'all';
  document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
  document.getElementById('nav-all').classList.add('active');
  document.getElementById('pageTitle').textContent = activeTag ? `#${activeTag}` : '全部';
  render();
}

// ═══════════════════════════════════════════
//  Stars
// ═══════════════════════════════════════════
function starsHtml(n, id) {
  return Array.from({length:5},(_,i)=>`<span class="star${i<n?' lit':''}" onclick="setCardRating(${id},${i+1})">★</span>`).join('');
}
function setCardRating(id, v) {
  const i = items.find(x => x.id === id);
  if (i) { i.rating = v; saveData(); render(); }
}

// ═══════════════════════════════════════════
//  Copy / Download
// ═══════════════════════════════════════════
function copyItem(content, e) {
  e.stopPropagation();
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(content)
      .then(() => showToast('已复制提示词 ✓'))
      .catch(() => execCopy(content));
  } else {
    execCopy(content);
  }
}
function execCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); showToast('已复制提示词 ✓'); }
  catch(err) { showToast('复制失败，请手动复制'); }
  document.body.removeChild(ta);
}
function downloadSkill(name, content, e) {
  e.stopPropagation();
  const blob = new Blob([content], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name.replace(/[/\\?%*:|"<>]/g,'_') + '.md';
  a.click();
  showToast('Skill 已下载 ✓');
}

// ═══════════════════════════════════════════
//  Modal
// ═══════════════════════════════════════════
function openModal(prefillTag) {
  editId = null; fRating = 0; fType = 'prompt'; fImg = '';
  fContentFormat = 'text';
  fSourceFileName = '';
  document.getElementById('modalTitle').textContent = '新建';
  document.getElementById('fName').value = '';
  document.getElementById('fContent').value = '';
  document.getElementById('jsonFile').value = '';
  document.getElementById('mdFile').value = '';
  selType('prompt');
  selPromptMode('text');
  // auto-fill tag from current context
  if (prefillTag !== undefined) {
    document.getElementById('fTags').value = prefillTag;
  } else if (activeTag) {
    document.getElementById('fTags').value = activeTag;
  } else {
    document.getElementById('fTags').value = '';
  }
  document.getElementById('fNote').value = '';
  renderFStars(); renderImgPrev();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 100);
}

function editItem(id, e) {
  e && e.stopPropagation();
  const item = items.find(i => i.id === id); if (!item) return;
  editId = id;
  document.getElementById('modalTitle').textContent = '编辑';
  fContentFormat = item.contentFormat || (item.type === 'skill' ? 'md' : 'text');
  fSourceFileName = item.sourceFileName || '';
  selType(item.type);
  document.getElementById('fName').value = item.name;
  document.getElementById('fContent').value = item.content;
  document.getElementById('fTags').value = item.tags.join(', ');
  document.getElementById('fNote').value = item.note || '';
  fRating = item.rating;
  fImg = imgCache[id] || '';
  renderFStars(); renderImgPrev();
  document.getElementById('overlay').classList.add('open');
}

function deleteItem(id, e) {
  e.stopPropagation();
  if (!confirm('确定删除？')) return;
  items = items.filter(i => i.id !== id);
  delete imgCache[id];
  dbDeleteImg(id);
  saveData(); render(); showToast('已删除');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function overlayBg(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function selType(t) {
  const previousType = fType;
  fType = t;
  document.getElementById('optP').className = 't-opt' + (t==='prompt' ? ' p-sel' : '');
  document.getElementById('optS').className = 't-opt' + (t==='skill'  ? ' s-sel' : '');

  const isSkill = t === 'skill';
  document.getElementById('promptSourceRow').style.display = isSkill ? 'none' : 'block';
  document.getElementById('skillFileRow').style.display = isSkill ? 'block' : 'none';

  if (isSkill) {
    if (fContentFormat !== 'md') fContentFormat = 'md';
    if (fSourceFileName && !/\.(md|txt)$/i.test(fSourceFileName)) fSourceFileName = '';
    document.getElementById('fContent').placeholder = '粘贴 Skill 内容，或上传 .md 文件自动填入…';
    renderSkillFileUI();
  } else {
    if (fContentFormat === 'md') {
      fContentFormat = 'text';
      if (/\.(md|txt)$/i.test(fSourceFileName)) fSourceFileName = '';
    }
    renderPromptSourceUI();
  }
}

function selPromptMode(mode) {
  fContentFormat = mode === 'json' ? 'json' : 'text';
  if (fContentFormat === 'text') fSourceFileName = '';
  renderPromptSourceUI();
}

function renderPromptSourceUI() {
  const isJson = fContentFormat === 'json';
  document.getElementById('promptModeText').className = 't-opt' + (!isJson ? ' p-sel' : '');
  document.getElementById('promptModeJson').className = 't-opt' + (isJson ? ' p-sel' : '');
  document.getElementById('jsonFileRow').style.display = isJson ? 'block' : 'none';
  document.getElementById('fContent').placeholder = isJson
    ? '上传 JSON 文件，或在这里粘贴完整 JSON 内容…'
    : '粘贴完整提示词…';

  const nameEl = document.getElementById('jsonFileName');
  const drop = document.getElementById('jsonDrop');
  if (isJson && fSourceFileName) {
    document.getElementById('jsonFileNameText').textContent = fSourceFileName;
    nameEl.style.display = 'flex';
    drop.style.display = 'none';
  } else {
    nameEl.style.display = 'none';
    drop.style.display = 'block';
  }
}

function renderSkillFileUI() {
  const nameEl = document.getElementById('mdFileName');
  const drop = document.getElementById('mdDrop');
  if (fType === 'skill' && fSourceFileName) {
    document.getElementById('mdFileNameText').textContent = fSourceFileName;
    nameEl.style.display = 'flex';
    drop.style.display = 'none';
  } else {
    nameEl.style.display = 'none';
    drop.style.display = 'block';
  }
}

function onJsonPick(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      document.getElementById('fContent').value = JSON.stringify(parsed, null, 2);
      fContentFormat = 'json';
      fSourceFileName = f.name;
      if (!document.getElementById('fName').value.trim()) {
        document.getElementById('fName').value = f.name.replace(/\.json$/i, '').replace(/[-_]/g, ' ');
      }
      renderPromptSourceUI();
      showToast('JSON 已读取并校验 ✓');
    } catch (err) {
      showToast('JSON 格式错误，请检查文件');
    }
  };
  r.readAsText(f, 'utf-8');
  e.target.value = '';
}

function clearJsonFile() {
  fSourceFileName = '';
  document.getElementById('jsonFile').value = '';
  renderPromptSourceUI();
}

function onImgPick(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { fImg = ev.target.result; renderImgPrev(); };
  r.readAsDataURL(f); e.target.value = '';
}
function clearImg() { fImg = ''; renderImgPrev(); }

function onMdPick(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    document.getElementById('fContent').value = ev.target.result;
    fContentFormat = 'md';
    fSourceFileName = f.name;
    if (!document.getElementById('fName').value.trim()) {
      document.getElementById('fName').value = f.name.replace(/\.md$/i, '').replace(/[-_]/g, ' ');
    }
    renderSkillFileUI();
    showToast('已读取 ' + f.name + ' ✓');
  };
  r.readAsText(f, 'utf-8');
  e.target.value = '';
}
function clearMd() {
  fSourceFileName = '';
  document.getElementById('mdFile').value = '';
  renderSkillFileUI();
}
function renderImgPrev() {
  const drop = document.getElementById('imgDrop');
  const wrap = document.getElementById('imgPrevWrap');
  const img  = document.getElementById('imgPrev');
  if (fImg) { drop.style.display='none'; wrap.style.display='block'; img.src=fImg; }
  else      { drop.style.display='block'; wrap.style.display='none'; }
}

function renderFStars() {
  document.getElementById('fStars').innerHTML = Array.from({length:5},(_,i) =>
    `<span class="f-star${i<fRating?' lit':''}" onclick="setFR(${i+1})">★</span>`
  ).join('');
}
function setFR(n) { fRating = n; renderFStars(); }

async function saveItem() {
  const name    = document.getElementById('fName').value.trim();
  const content = document.getElementById('fContent').value.trim();
  if (!name)    { document.getElementById('fName').focus(); return; }
  if (!content) { document.getElementById('fContent').focus(); return; }

  if (fType === 'prompt' && fContentFormat === 'json') {
    try {
      JSON.parse(content);
    } catch (err) {
      showToast('JSON 格式错误，暂时无法保存');
      document.getElementById('fContent').focus();
      return;
    }
  }

  const tags = document.getElementById('fTags').value.split(/[,，]/).map(t=>t.trim()).filter(Boolean);
  const note = document.getElementById('fNote').value.trim();

  if (editId) {
    const item = items.find(i => i.id === editId);
    Object.assign(item, {
      type:fType, name, content, tags, note, rating:fRating,
      contentFormat: fType === 'skill' ? 'md' : fContentFormat,
      sourceFileName: fSourceFileName
    });
    if (fImg) { imgCache[editId] = fImg; await dbSaveImg(editId, fImg); }
    else      { delete imgCache[editId]; await dbDeleteImg(editId); }
  } else {
    const maxOrder = items.length ? Math.max(...items.map(i=>i.order||0)) : 0;
    const newId = Date.now();
    items.unshift({
      id:newId, type:fType, name, content, tags, note, rating:fRating,
      contentFormat: fType === 'skill' ? 'md' : fContentFormat,
      sourceFileName: fSourceFileName,
      order:maxOrder+1, created:newId
    });
    if (fImg) { imgCache[newId] = fImg; await dbSaveImg(newId, fImg); }
  }
  saveData(); closeModal(); render(); showToast(editId ? '已更新 ✓' : '已创建 ✓');
}

// ═══════════════════════════════════════════
//  Export / Import
// ═══════════════════════════════════════════
async function exportJSON() {
  const allImgs = await dbGetAllImgs();
  const imgMap = {};
  allImgs.forEach(r => { imgMap[r.id] = r.base64; });
  const exportData = items.map(item => ({ ...item, img: imgMap[item.id] || '' }));
  const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `prompts-${new Date().toISOString().slice(0,10)}.json`; a.click();
  showToast('已导出 ✓');
}
function importClick() { document.getElementById('importFile').click(); }
function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw 0;
      if (!confirm(`导入 ${data.length} 条？将合并到现有数据`)) return;
      const ids = new Set(items.map(i => i.id));
      for (const d of data) {
        if (!ids.has(d.id)) {
          const img = d.img || ''; delete d.img;
          if (!d.contentFormat) d.contentFormat = d.type === 'skill' ? 'md' : 'text';
          if (!d.sourceFileName) d.sourceFileName = '';
          if (!d.order) d.order = Date.now() + Math.random();
          items.unshift(d);
          if (img) { imgCache[d.id] = img; await dbSaveImg(d.id, img); }
        }
      }
      saveData(); render(); showToast(`已导入 ${data.length} 条 ✓`);
    } catch { showToast('格式错误，导入失败'); }
  };
  r.readAsText(file); e.target.value = '';
}

// ═══════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════
//  Lightbox
// ═══════════════════════════════════════════
function openLightbox(id, e) {
  e && e.stopPropagation();
  const src = imgCache[id]; if (!src) return;
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════════
//  Tooltip
// ═══════════════════════════════════════════
let ttTimer = null;
function getTooltip() { return document.getElementById('tooltipBox'); }
function showTooltip(text, e) {
  clearTimeout(ttTimer);
  ttTimer = setTimeout(() => {
    const tt = getTooltip();
    tt.textContent = text;
    tt.classList.add('show');
    posTooltip(e);
  }, 400);
}
function posTooltip(e) {
  const tt = getTooltip();
  const pad = 14, bw = 320;
  let x = e.clientX + pad, y = e.clientY + pad;
  if (x + bw > window.innerWidth - 10) x = e.clientX - bw - pad;
  if (y + 220 > window.innerHeight - 10) y = e.clientY - 220;
  tt.style.left = x + 'px'; tt.style.top = y + 'px';
}
function moveTooltip(e) { const tt = getTooltip(); if (tt.classList.contains('show')) posTooltip(e); }
function hideTooltip() { clearTimeout(ttTimer); getTooltip().classList.remove('show'); }

// ═══════════════════════════════════════════
//  Card drag-and-drop (reorder)
// ═══════════════════════════════════════════
function onCardDragStart(id, e) {
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}
function onCardDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over-card'));
}
function onCardDragOver(id, e) {
  e.preventDefault();
  if (dragSrcId === id) return;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over-card'));
  e.currentTarget.classList.add('drag-over-card');
}
function onCardDrop(targetId, e) {
  e.preventDefault();
  if (!dragSrcId || dragSrcId === targetId) return;
  const srcIdx = items.findIndex(i => i.id === dragSrcId);
  const tgtIdx = items.findIndex(i => i.id === targetId);
  if (srcIdx < 0 || tgtIdx < 0) return;
  const [moved] = items.splice(srcIdx, 1);
  items.splice(tgtIdx, 0, moved);
  // reassign order values
  items.forEach((item, idx) => { item.order = idx + 1; });
  dragSrcId = null;
  // switch sort to manual
  document.getElementById('sortSel').value = 'manual';
  saveData(); render();
}

// ═══════════════════════════════════════════
//  Tag drag-and-drop (sidebar reorder)
// ═══════════════════════════════════════════
function onTagDragStart(tag, e) {
  tagDragSrc = tag;
  e.dataTransfer.effectAllowed = 'move';
}
function onTagDragOver(tag, e) {
  e.preventDefault();
  if (tagDragSrc === tag) return;
  document.querySelectorAll('.tag-item').forEach(el => el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function onTagDrop(targetTag, e) {
  e.preventDefault();
  if (!tagDragSrc || tagDragSrc === targetTag) return;
  const tags = allTagsSorted();
  const si = tags.indexOf(tagDragSrc), ti = tags.indexOf(targetTag);
  if (si < 0 || ti < 0) return;
  tags.splice(si, 1); tags.splice(ti, 0, tagDragSrc);
  tagOrder = tags; tagDragSrc = null;
  saveData(); render();
}
function onTagDragEnd() {
  document.querySelectorAll('.tag-item').forEach(el => el.classList.remove('drag-over'));
}

// ═══════════════════════════════════════════
//  Escape util
// ═══════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }


// ═══════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════
function render() {
  const list = filtered();
  const prompts = items.filter(i => i.type === 'prompt').length;
  const skills  = items.filter(i => i.type === 'skill').length;
  document.getElementById('cnt-all').textContent    = items.length;
  document.getElementById('cnt-prompt').textContent = prompts;
  document.getElementById('cnt-skill').textContent  = skills;

  // sidebar tags (draggable)
  const tags = allTagsSorted();
  document.getElementById('tagList').innerHTML = tags.map(t => `
    <button class="tag-item${activeTag===t?' active':''}"
      draggable="true"
      ondragstart="onTagDragStart('${esc(t)}',event)"
      ondragover="onTagDragOver('${esc(t)}',event)"
      ondrop="onTagDrop('${esc(t)}',event)"
      ondragend="onTagDragEnd()"
      onclick="setTag('${t.replace(/'/g,"\\'")}')">${esc(t)}<span class="tag-dot" style="display:inline-block;margin-left:auto"></span><i class="ti ti-grip-vertical tag-drag-handle"></i>
    </button>`
  ).join('');

  // stats
  const avg = list.length ? (list.reduce((s,i)=>s+i.rating,0)/list.length).toFixed(1) : '—';
  const hi  = list.filter(i => i.rating >= 4).length;
  const withImg = Object.keys(imgCache).filter(k => imgCache[k]).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-lbl">显示</div><div class="stat-val">${list.length}</div></div>
    <div class="stat-card"><div class="stat-lbl">平均评分</div><div class="stat-val">${avg}</div></div>
    <div class="stat-card"><div class="stat-lbl">高分 ≥4★</div><div class="stat-val">${hi}</div></div>
    <div class="stat-card"><div class="stat-lbl">含效果图</div><div class="stat-val">${withImg}</div></div>
  `;

  if (!list.length) {
    document.getElementById('cardGrid').innerHTML = `<div class="empty"><i class="ti ti-inbox"></i><p>暂无内容，点击「新建」开始添加</p></div>`;
    return;
  }

  // Render cards using data-* attributes — NO inline onclick on interactive buttons
  document.getElementById('cardGrid').innerHTML = list.map(item => {
    const img = imgCache[item.id] || '';
    const isPrompt = item.type === 'prompt';
    const isJsonPrompt = isPrompt && item.contentFormat === 'json';
    const actionBtn = isJsonPrompt
      ? `<button class="ico-btn dl" data-action="download" data-id="${item.id}" data-name="${esc(item.sourceFileName || item.name)}" data-content="${esc(item.content)}" data-ext="json" data-mime="application/json" data-toast="JSON 提示词已下载 ✓" title="下载 JSON 提示词"><i class="ti ti-download"></i></button>`
      : isPrompt
        ? `<button class="ico-btn" data-action="copy" data-id="${item.id}" data-content="${esc(item.content)}" title="复制提示词"><i class="ti ti-copy"></i></button>`
        : `<button class="ico-btn dl" data-action="download" data-id="${item.id}" data-name="${esc(item.sourceFileName || item.name)}" data-content="${esc(item.content)}" data-ext="md" data-mime="text/markdown" data-toast="Skill 已下载 ✓" title="下载 Skill"><i class="ti ti-download"></i></button>`;

    return `
    <div class="card" data-id="${item.id}"
      draggable="true"
      ondragstart="onCardDragStart(${item.id},event)"
      ondragend="onCardDragEnd(event)"
      ondragover="onCardDragOver(${item.id},event)"
      ondrop="onCardDrop(${item.id},event)">
      ${img
        ? `<div class="card-img-wrap" data-action="lightbox" data-id="${item.id}">
             <i class="ti ti-grip-horizontal drag-handle"></i>
             <img class="card-img" src="${esc(img)}" alt="效果图" loading="lazy">
             <button class="img-del" data-action="delimg" data-id="${item.id}" title="移除图片"><i class="ti ti-x"></i></button>
           </div>`
        : `<div class="card-img-ph-wrap">
             <i class="ti ti-grip-horizontal drag-handle"></i>
             <div class="card-img-ph" data-action="addimg" data-id="${item.id}">
               <i class="ti ti-photo-plus"></i><span>点击添加效果图</span>
             </div>
           </div>`
      }
      <div class="card-body">
        <div class="card-head">
          <span class="card-name">${esc(item.name)}</span>
          <span class="type-badge ${isJsonPrompt?'b-json':(isPrompt?'b-prompt':'b-skill')}">${isJsonPrompt?'JSON 提示词':(isPrompt?'提示词':'Skill')}</span>
        </div>
        <p class="card-text" data-tooltip="${esc(item.content)}">${esc(item.content)}</p>
        ${item.tags.length ? `<div class="card-tags">${item.tags.map(t=>`<span class="card-tag">#${esc(t)}</span>`).join('')}</div>` : ''}
        ${item.note ? `<p class="card-note" data-tooltip="${esc(item.note)}">${esc(item.note)}</p>` : ''}
        <div class="card-foot">
          <div class="stars">${starsHtml(item.rating, item.id)}</div>
          <div class="card-actions">
            ${actionBtn}
            <button class="ico-btn" data-action="edit" data-id="${item.id}" title="编辑"><i class="ti ti-edit"></i></button>
            <button class="ico-btn del" data-action="delete" data-id="${item.id}" title="删除"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  Event delegation on card grid
// ═══════════════════════════════════════════
function setupDelegation() {
  const grid = document.getElementById('cardGrid');

  // ── clicks ──
  grid.addEventListener('click', e => {
    // find nearest element with data-action
    const el = e.target.closest('[data-action]');
    if (!el) {
      // clicked card body with no specific action → open edit
      const card = e.target.closest('.card');
      if (card) openEditById(parseInt(card.dataset.id));
      return;
    }
    const action = el.dataset.action;
    const id     = parseInt(el.dataset.id);

    if (action === 'noop') return;

    if (action === 'copy') {
      const content = el.dataset.content;
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(content)
          .then(() => showToast('已复制提示词 ✓'))
          .catch(() => execCopy(content));
      } else { execCopy(content); }
      return;
    }

    if (action === 'download') {
      const name    = el.dataset.name || 'prompt';
      const content = el.dataset.content || '';
      const ext     = el.dataset.ext || 'txt';
      const mime    = el.dataset.mime || 'text/plain';
      const toast   = el.dataset.toast || '文件已下载 ✓';
      const cleanName = name.replace(/[/\\?%*:|"<>]/g,'_');
      const fileName = cleanName.toLowerCase().endsWith('.' + ext.toLowerCase())
        ? cleanName
        : cleanName + '.' + ext;
      const blob = new Blob([content], {type:mime});
      const a = document.createElement('a');
      const url = URL.createObjectURL(blob);
      a.href = url;
      a.download = fileName;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 500);
      showToast(toast);
      return;
    }

    if (action === 'edit')     { openEditById(id); return; }
    if (action === 'delete')   { doDelete(id); return; }
    if (action === 'lightbox') { doLightbox(id); return; }
    if (action === 'delimg')   { doDelImg(id); return; }
    if (action === 'addimg')   { doAddImg(id); return; }

    // fallback: open card
    const card = e.target.closest('.card');
    if (card) openEditById(parseInt(card.dataset.id));
  });

  // ── tooltip via mouseover/mouseout ──
  grid.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-tooltip]');
    if (el) showTooltip(el.dataset.tooltip, e);
  });
  grid.addEventListener('mousemove', e => {
    const tt = document.getElementById('tooltipBox');
    if (tt.classList.contains('show')) posTooltip(e);
  });
  grid.addEventListener('mouseout', e => {
    const el = e.target.closest('[data-tooltip]');
    if (el) hideTooltip();
  });
}

function openEditById(id) {
  const item = items.find(i => i.id === id); if (!item) return;
  editId = id;
  document.getElementById('modalTitle').textContent = '编辑';
  fContentFormat = item.contentFormat || (item.type === 'skill' ? 'md' : 'text');
  fSourceFileName = item.sourceFileName || '';
  selType(item.type);
  document.getElementById('fName').value    = item.name;
  document.getElementById('fContent').value = item.content;
  document.getElementById('fTags').value    = item.tags.join(', ');
  document.getElementById('fNote').value    = item.note || '';
  fRating = item.rating;
  fImg    = imgCache[id] || '';
  renderFStars(); renderImgPrev();
  document.getElementById('overlay').classList.add('open');
}

function doDelete(id) {
  if (!confirm('确定删除？')) return;
  items = items.filter(i => i.id !== id);
  delete imgCache[id]; dbDeleteImg(id);
  saveData(); render(); showToast('已删除');
}

function doLightbox(id) {
  const src = imgCache[id]; if (!src) return;
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

async function doDelImg(id) {
  delete imgCache[id]; await dbDeleteImg(id); render();
}

function doAddImg(id) {
  openEditById(id);
  setTimeout(() => document.getElementById('imgFile').click(), 150);
}

// ═══════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════
async function init() {
  try {
    const allImgs = await dbGetAllImgs();
    allImgs.forEach(r => { imgCache[r.id] = r.base64; });
  } catch(e) {
    console.warn('IndexedDB unavailable:', e);
  }
  render();
  setupDelegation();

  // wire upload drop zones (outside card grid, so not covered by delegation)
  document.getElementById('imgDrop').addEventListener('click', () => {
    document.getElementById('imgFile').click();
  });
  document.getElementById('mdDrop').addEventListener('click', () => {
    document.getElementById('mdFile').click();
  });
  document.getElementById('jsonDrop').addEventListener('click', () => {
    document.getElementById('jsonFile').click();
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeModal(); }
  if ((e.metaKey||e.ctrlKey) && e.key === 'k') { e.preventDefault(); openModal(); }
});

init();
</script>
